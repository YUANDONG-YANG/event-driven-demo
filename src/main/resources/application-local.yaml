# =============================================================================
# Profile: local — local development (default datasource H2; use env vars for Docker PostgreSQL)
# =============================================================================
# Docker PostgreSQL + Redis example:
#   set SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/apply_alberta
#   set SPRING_DATASOURCE_USERNAME=admin
#   set SPRING_DATASOURCE_PASSWORD=admin
# (If unset, the in-memory H2 datasource below is used.)
#
# End-to-end simulation (additional profiles): local,e2e or local,e2e-azure (see --- sections below)
# =============================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:vibedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

# GET /api/review; local storage is watched via WatchService, not cloud Event Grid on disk.
# Default storage root is the project path below; override with STORAGE_ROOT.
demo:
  storage:
    root: ${STORAGE_ROOT:F:/demo/vibe_coding/src/main/resources/storage}
    watch-enabled: true
    ensure-today-folder-on-startup: true
    forward-to-event-grid: false
    forward-to-service-bus: false
  azure:
    event-grid:
      enabled: false
      topic-endpoint: ${AZURE_EVENTGRID_TOPIC_ENDPOINT:}
      topic-key: ${AZURE_EVENTGRID_TOPIC_KEY:}
    service-bus:
      enabled: false
      connection-string: ${AZURE_SERVICEBUS_CONNECTION_STRING:}
      entity-name: ${AZURE_SERVICEBUS_ENTITY:demo-queue}
      subscription-name: ${AZURE_SERVICEBUS_SUBSCRIPTION:}

---
# =============================================================================
# Profile: e2e (use with local: spring.profiles.active=local,e2e)
# Shortcut: publish Event Grid + send directly to Service Bus -> consume -> DB
# Requires: AZURE_EVENTGRID_TOPIC_*, AZURE_SERVICEBUS_CONNECTION_STRING, AZURE_SERVICEBUS_ENTITY
# =============================================================================
spring:
  config:
    activate:
      on-profile: e2e
demo:
  storage:
    forward-to-event-grid: true
    forward-to-service-bus: true
  azure:
    event-grid:
      enabled: true
    service-bus:
      enabled: true

---
# =============================================================================
# Profile: e2e-azure (use with local: spring.profiles.active=local,e2e-azure)
# Closer to cloud: publish Event Grid only; Service Bus receives via Portal event subscription only; do not enable with e2e
# =============================================================================
spring:
  config:
    activate:
      on-profile: e2e-azure
demo:
  storage:
    forward-to-event-grid: true
    forward-to-service-bus: false
  azure:
    event-grid:
      enabled: true
    service-bus:
      enabled: true
