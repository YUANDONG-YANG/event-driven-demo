# =============================================================================
# Profile: local — 本机开发（默认数据源 H2；可用环境变量切到 Docker PostgreSQL）
# =============================================================================
# Docker PostgreSQL + Redis 示例：
#   set SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/apply_alberta
#   set SPRING_DATASOURCE_USERNAME=admin
#   set SPRING_DATASOURCE_PASSWORD=admin
# （不设则使用下方 H2 内存库）
#
# 端到端模拟（另加 profile）：local,e2e 或 local,e2e-azure（见本文件后半段 --- 分隔文档）
# =============================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:vibedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

# GET /api/review；本地 storage 由 WatchService 监听，非云端 Event Grid。
# storage 根目录默认 F: 工程路径，可用 STORAGE_ROOT 覆盖。
demo:
  storage:
    root: ${STORAGE_ROOT:F:/demo/vibe_coding/src/main/resources/storage}
    watch-enabled: true
    ensure-today-folder-on-startup: true
    forward-to-event-grid: false
    forward-to-service-bus: false
  azure:
    event-grid:
      enabled: false
      topic-endpoint: ${AZURE_EVENTGRID_TOPIC_ENDPOINT:}
      topic-key: ${AZURE_EVENTGRID_TOPIC_KEY:}
    service-bus:
      enabled: false
      connection-string: ${AZURE_SERVICEBUS_CONNECTION_STRING:}
      entity-name: ${AZURE_SERVICEBUS_ENTITY:demo-queue}
      subscription-name: ${AZURE_SERVICEBUS_SUBSCRIPTION:}

---
# =============================================================================
# Profile: e2e（与 local 同时使用：spring.profiles.active=local,e2e）
# 捷径：发 Event Grid + 直连 Service Bus → 消费 → DB
# 需：AZURE_EVENTGRID_TOPIC_*、AZURE_SERVICEBUS_CONNECTION_STRING、AZURE_SERVICEBUS_ENTITY
# =============================================================================
spring:
  config:
    activate:
      on-profile: e2e
demo:
  storage:
    forward-to-event-grid: true
    forward-to-service-bus: true
  azure:
    event-grid:
      enabled: true
    service-bus:
      enabled: true

---
# =============================================================================
# Profile: e2e-azure（与 local 同时使用：spring.profiles.active=local,e2e-azure）
# 更接近云上：只发 Event Grid；Service Bus 仅由门户「事件订阅」投递；不要与 e2e 同时启用
# =============================================================================
spring:
  config:
    activate:
      on-profile: e2e-azure
demo:
  storage:
    forward-to-event-grid: true
    forward-to-service-bus: false
  azure:
    event-grid:
      enabled: true
    service-bus:
      enabled: true
