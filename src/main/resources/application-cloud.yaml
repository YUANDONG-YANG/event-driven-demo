# =============================================================================
# Profile: cloud — Azure or other deployments (env vars / Key Vault injection)
# =============================================================================
# Startup example: spring.profiles.active=cloud
# Required (names are examples; use your secret store):
#   SPRING_DATASOURCE_URL / USERNAME / PASSWORD
#   REDIS_HOST (and password if needed via spring.data.redis.password)
#   AZURE_EVENTGRID_TOPIC_ENDPOINT, AZURE_EVENTGRID_TOPIC_KEY (if Event Grid is enabled)
#   AZURE_SERVICEBUS_CONNECTION_STRING, AZURE_SERVICEBUS_ENTITY
# Prefer a mounted volume or Blob for storage root, not a local F: path:
#   STORAGE_ROOT=/data/storage
# =============================================================================
spring:
  config:
    activate:
      on-profile: cloud
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

demo:
  storage:
    root: ${STORAGE_ROOT:/data/storage}
    watch-enabled: ${DEMO_STORAGE_WATCH_ENABLED:true}
    ensure-today-folder-on-startup: true
    forward-to-event-grid: ${DEMO_FORWARD_TO_EVENT_GRID:true}
    forward-to-service-bus: ${DEMO_FORWARD_TO_SERVICE_BUS:true}
  azure:
    event-grid:
      enabled: ${AZURE_EVENTGRID_ENABLED:true}
      topic-endpoint: ${AZURE_EVENTGRID_TOPIC_ENDPOINT}
      topic-key: ${AZURE_EVENTGRID_TOPIC_KEY}
    service-bus:
      enabled: ${AZURE_SERVICEBUS_ENABLED:true}
      connection-string: ${AZURE_SERVICEBUS_CONNECTION_STRING}
      entity-name: ${AZURE_SERVICEBUS_ENTITY}
      subscription-name: ${AZURE_SERVICEBUS_SUBSCRIPTION:}
